---
- name: Check Swarm Manager status
  shell: docker info --format '{% raw %}{{.Swarm.ControlAvailable}}{% endraw %}'
  register: is_swarm_manager
  changed_when: false

- name: Check Swarm Node state
  shell: docker info --format '{% raw %}{{.Swarm.LocalNodeState}}{% endraw %}'
  register: swarm_node_state
  changed_when: false

- name: Initialize Docker Swarm
  shell: docker swarm init --advertise-addr {{ internal_ip }}
  when: is_swarm_manager.stdout != 'true'
  register: swarm_init_result
  ignore_errors: yes

- name: Get Docker Swarm worker join token
  shell: docker swarm join-token worker -q
  register: worker_token
  changed_when: false

- name: Set worker token fact for other hosts
  set_fact:
    swarm_worker_token: "{{ worker_token.stdout }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  with_items: "{{ groups['workers'] }}"

- name: Create Docker Secrets for databases
  shell: |
    if ! docker secret inspect {{ item.name }} >/dev/null 2>&1; then
      echo "{{ item.pass }}" | docker secret create {{ item.name }} -
    fi
  loop:
    - { name: 'payment_db_pass', pass: "{{ payment_db_pass }}" }
    - { name: 'core_db_pass', pass: "{{ core_db_pass }}" }
    - { name: 'commerce_db_pass', pass: "{{ commerce_db_pass }}" }
    - { name: 'automation_db_pass', pass: "{{ automation_db_pass }}" }
  when: inventory_hostname == groups['managers'][0]
